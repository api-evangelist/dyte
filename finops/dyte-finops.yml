description: >-
  FinOps view of Dyte spend. Dyte bills on a per-participant-minute basis: every
  participant accrues minutes for the duration they are connected, with separate
  (lower) rates for audio-only versus video. A recurring monthly free allotment of
  participant minutes offsets the first slice of usage; recording and livestreaming
  are metered separately. Cost is driven by participant count multiplied by session
  duration, so concurrency and meeting length are the primary levers. Dyte is
  migrating to Cloudflare RealtimeKit, so billing may shift to Cloudflare; rates are
  not reconciled.
notes: >-
  Per-minute rates and add-on (recording/livestreaming/transcription) charges are
  not reconciled; verify against dyte.io and the Cloudflare RealtimeKit pricing page
  during reconciliation, since the product is transitioning to Cloudflare.
