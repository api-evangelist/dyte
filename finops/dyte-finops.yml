principles:
- name: Visibility
  description: Pull Dyte session/usage data via the Sessions API (minutes_consumed, max concurrent participants) to attribute participant-minute burn per meeting.
- name: Allocation
  description: Tag participants with custom_participant_id and presets, and map meetings to internal cost centers/workloads.
- name: Optimization
  description: Use audio-only sessions where video is not needed; cap meeting duration and concurrency; record/livestream only when required; stay within the monthly free allotment for low-volume workloads.
- name: Accountability
  description: Assign owners per organization/key; review participant-minute spend monthly against budget; plan for the Cloudflare RealtimeKit migration's pricing.
